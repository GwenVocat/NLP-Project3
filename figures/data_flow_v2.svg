<svg xmlns="http://www.w3.org/2000/svg" width="580" height="740" viewBox="0 0 580 740">
  <defs>
    <!-- standard arrow -->
    <marker id="a" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0,0 9,3.5 0,7" fill="#374151"/>
    </marker>
    <!-- amber arrow for Phrase n-grams -->
    <marker id="ap" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0,0 9,3.5 0,7" fill="#b07018"/>
    </marker>
  </defs>

  <rect width="580" height="740" fill="#ffffff"/>

  <!-- ═══════════════════════════════════════
       CORPUS  (dark anchor at top)
  ═══════════════════════════════════════ -->
  <rect x="30" y="20" width="520" height="56" rx="8" fill="#1e3a5f"/>
  <text x="290" y="46"  text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="15.5" font-weight="700" fill="#ffffff">Mozilla Common Voice STT4SG-350</text>
  <text x="290" y="65"  text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="12"              fill="rgba(255,255,255,0.80)">Ostschweiz subset · 3,084 clips</text>

  <line x1="290" y1="76" x2="290" y2="100" stroke="#374151" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- ═══════════════════════════════════════
       INPUT PER CLIP
       Input boxes are x-aligned with their transcription boxes below,
       so that all connecting arrows are perfectly vertical.
  ═══════════════════════════════════════ -->
  <rect x="30" y="102" width="520" height="74" rx="10" fill="#f6f8fc" stroke="#d0d7e4" stroke-width="1.2"/>
  <text x="52" y="118"  font-family="Helvetica Neue,Arial,sans-serif" font-size="8.5" font-weight="700" fill="#8a9ab5" letter-spacing="1.2">INPUT PER CLIP</text>

  <!-- dialect audio — centred at x=155, same as ipa_audio below -->
  <rect x="55"  y="126" width="200" height="40" rx="7" fill="#eaf5ee" stroke="#2d7a55" stroke-width="1.8"/>
  <text x="155" y="151" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="13"   font-weight="600" fill="#1a5234">dialect audio</text>

  <!-- HD sentence — centred at x=425, same as ipa_reference below -->
  <rect x="325" y="126" width="200" height="40" rx="7" fill="#eaf5ee" stroke="#2d7a55" stroke-width="1.8"/>
  <text x="425" y="151" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="13"   font-weight="600" fill="#1a5234">HD sentence</text>

  <!-- Straight vertical arrows: no diagonals -->
  <line x1="155" y1="166" x2="155" y2="215" stroke="#374151" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="425" y1="166" x2="425" y2="215" stroke="#374151" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- ═══════════════════════════════════════
       AUTOMATIC TRANSCRIPTION
  ═══════════════════════════════════════ -->
  <rect x="20" y="196" width="540" height="142" rx="10" fill="#f6f8fc" stroke="#d0d7e4" stroke-width="1.2"/>
  <text x="42" y="212"  font-family="Helvetica Neue,Arial,sans-serif" font-size="8.5" font-weight="700" fill="#8a9ab5" letter-spacing="1.2">AUTOMATIC TRANSCRIPTION</text>

  <!-- ipa_audio (primary target) -->
  <rect x="55"  y="216" width="200" height="80" rx="7" fill="#edf2fb" stroke="#2552a8" stroke-width="1.8"/>
  <text x="155" y="248" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="14"   font-weight="700" fill="#1a3e8a">ipa_audio</text>
  <text x="155" y="268" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="11.5"              fill="#2c5698">audio → IPA</text>
  <text x="155" y="284" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="10"               fill="#4a5e94">matching target</text>

  <!-- ipa_reference (annotation context, visually lighter) -->
  <rect x="325" y="216" width="200" height="80" rx="7" fill="#f0f3f6" stroke="#5a6b80" stroke-width="1.8"/>
  <text x="425" y="248" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="14"   font-weight="700" fill="#3a4e62">ipa_reference</text>
  <text x="425" y="268" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="11.5"              fill="#4a5e72">HD → IPA</text>
  <text x="425" y="284" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="10"               fill="#5a6e82">annotation context</text>

  <!-- Merge: ipa_audio + ipa_reference → CSV
       Both lines drop to a horizontal bus; the T-junction arrow at x=290
       (midpoint of 155 and 425) lands exactly centred on the CSV box. -->
  <line x1="155" y1="296" x2="155" y2="322" stroke="#374151" stroke-width="1.5"/>
  <line x1="425" y1="296" x2="425" y2="322" stroke="#374151" stroke-width="1.5"/>
  <line x1="155" y1="322" x2="425" y2="322" stroke="#374151" stroke-width="1.5"/>
  <line x1="290" y1="322" x2="290" y2="345" stroke="#374151" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- ═══════════════════════════════════════
       TRANSCRIPTIONS.CSV
  ═══════════════════════════════════════ -->
  <rect x="90"  y="347" width="400" height="36" rx="7" fill="#eaf5ee" stroke="#2d7a55" stroke-width="1.8"/>
  <text x="290" y="371" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="13"   font-weight="600" fill="#1a5234">transcriptions.csv</text>

  <line x1="290" y1="383" x2="290" y2="407" stroke="#374151" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- ═══════════════════════════════════════
       CLEANING & IPA NORMALISATION
  ═══════════════════════════════════════ -->
  <rect x="40"  y="409" width="500" height="62" rx="8" fill="#eaf5ee" stroke="#2d7a55" stroke-width="1.8"/>
  <text x="290" y="434" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="14"   font-weight="700" fill="#1a5234">Cleaning &amp; IPA normalisation</text>
  <text x="290" y="453" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="11"               fill="#2a6244">errors · short outputs · garbled IPA · repetitions · stress marks</text>

  <line x1="290" y1="471" x2="290" y2="495" stroke="#374151" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- ═══════════════════════════════════════
       ALIGNMENT METHODS
  ═══════════════════════════════════════ -->
  <rect x="20"  y="497" width="540" height="126" rx="10" fill="#f6f8fc" stroke="#d0d7e4" stroke-width="1.2"/>
  <text x="42"  y="513"  font-family="Helvetica Neue,Arial,sans-serif" font-size="8.5" font-weight="700" fill="#8a9ab5" letter-spacing="1.2">ALIGNMENT METHODS</text>

  <!-- Greedy PMI -->
  <rect x="43"  y="519" width="110" height="52" rx="7" fill="#edf2fb" stroke="#2050a0" stroke-width="1.8"/>
  <text x="98"  y="542" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="12.5" font-weight="600" fill="#14387a">Greedy</text>
  <text x="98"  y="560" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="11"               fill="#2a5090">PMI</text>

  <!-- Positional baseline -->
  <rect x="171" y="519" width="110" height="52" rx="7" fill="#edf2fb" stroke="#2050a0" stroke-width="1.8"/>
  <text x="226" y="542" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="12.5" font-weight="600" fill="#14387a">Positional</text>
  <text x="226" y="560" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="11"               fill="#2a5090">baseline</text>

  <!-- IBM / EM Model 1 -->
  <rect x="299" y="519" width="110" height="52" rx="7" fill="#edf2fb" stroke="#2050a0" stroke-width="1.8"/>
  <text x="354" y="542" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="12.5" font-weight="600" fill="#14387a">IBM / EM</text>
  <text x="354" y="560" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="11"               fill="#2a5090">Model 1</text>

  <!-- Phrase n-grams (dashed — qualitative extension) -->
  <rect x="427" y="519" width="110" height="52" rx="7" fill="#fef8ee" stroke="#b07018" stroke-width="1.8" stroke-dasharray="5,3"/>
  <text x="482" y="542" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="12.5" font-weight="600" fill="#8b6114">Phrase</text>
  <text x="482" y="560" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="11"               fill="#8b6114">n-grams</text>

  <!-- Merge: 3 main methods → Eval
       Horizontal bus spans x=98–354; T-junction at x=290 lands centred on Eval. -->
  <line x1="98"  y1="571" x2="98"  y2="603" stroke="#374151" stroke-width="1.5"/>
  <line x1="226" y1="571" x2="226" y2="603" stroke="#374151" stroke-width="1.5"/>
  <line x1="354" y1="571" x2="354" y2="603" stroke="#374151" stroke-width="1.5"/>
  <line x1="98"  y1="603" x2="354" y2="603" stroke="#374151" stroke-width="1.5"/>
  <line x1="290" y1="603" x2="290" y2="643" stroke="#374151" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- Phrase n-grams → Eval (separate dashed amber path) -->
  <line x1="482" y1="571" x2="482" y2="643" stroke="#b07018" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ap)"/>

  <!-- ═══════════════════════════════════════
       EVALUATION  (dark anchor at bottom)
  ═══════════════════════════════════════ -->
  <rect x="60"  y="645" width="460" height="58" rx="8" fill="#1b5e20"/>
  <text x="290" y="671" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="14"   font-weight="700" fill="#ffffff">Evaluation &amp; Analysis</text>
  <text x="290" y="690" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="11"               fill="rgba(255,255,255,0.80)">word-level precision / coverage · phrase examples</text>

  <text x="290" y="720" text-anchor="middle" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" fill="#9ca3af">Dashed: qualitative extension (Phrase n-grams).</text>
</svg>
